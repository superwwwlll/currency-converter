<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f3ee" />
  <meta name="description" content="输入人民币拿货价，快速计算 A、B 两种台币报价。" />
  <title>台币报价计算器</title>
  <style>
    :root {
      --ink: #17211c;
      --muted: #68736d;
      --paper: rgba(255,255,255,.86);
      --line: rgba(23,33,28,.11);
      --green: #146b4a;
      --green-dark: #0c4f36;
      --shadow: 0 24px 70px rgba(36,48,41,.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 28px 18px;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 15% 5%, rgba(237,181,92,.22), transparent 31rem),
        radial-gradient(circle at 92% 90%, rgba(38,130,91,.16), transparent 34rem),
        #f5f3ee;
    }
    main { width: min(100%, 580px); }
    .eyebrow { margin: 0 0 10px; color: var(--green); font-size: 12px; font-weight: 800; letter-spacing: .18em; text-transform: uppercase; }
    h1 { margin: 0; font-size: clamp(34px, 8vw, 52px); letter-spacing: -.055em; line-height: 1.05; }
    .intro { margin: 14px 0 28px; color: var(--muted); font-size: 15px; }
    .card {
      padding: clamp(20px, 5vw, 34px);
      border: 1px solid rgba(255,255,255,.75);
      border-radius: 28px;
      background: var(--paper);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    label { display: block; margin-bottom: 9px; color: var(--muted); font-size: 13px; font-weight: 700; }
    .amount-wrap {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      min-height: 82px;
      border-bottom: 1px solid var(--line);
      transition: border-color .2s, box-shadow .2s;
    }
    .amount-wrap:focus-within { border-color: var(--green); box-shadow: 0 4px 0 -3px rgba(20,107,74,.25); }
    #cost {
      width: 100%;
      min-width: 0;
      padding: 10px 0 14px;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font: 700 clamp(38px, 10vw, 62px)/1.1 inherit;
      letter-spacing: -.045em;
    }
    #cost::-webkit-inner-spin-button, #cost::-webkit-outer-spin-button { appearance: none; margin: 0; }
    .amount-code {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 58px;
      padding: 8px 11px;
      border-radius: 10px;
      color: var(--green);
      background: rgba(20,107,74,.08);
      font-size: 14px;
      font-weight: 800;
    }
    .quotes { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; margin-top: 28px; }
    .quote { min-width: 0; padding: 22px; border-radius: 20px; background: rgba(20,107,74,.055); }
    .quote-b { background: rgba(210,154,50,.09); }
    .quote-label { color: var(--muted); font-size: 13px; font-weight: 700; }
    .quote-value { margin-top: 7px; overflow-wrap: anywhere; font-size: clamp(27px, 7vw, 40px); font-weight: 800; letter-spacing: -.045em; }
    .quote-value span { color: var(--green); font-size: .42em; letter-spacing: .02em; }
    .formula { margin-top: 10px; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .note { margin: 20px 0 0; color: var(--muted); font-size: 12px; line-height: 1.65; }
    footer { margin-top: 18px; color: var(--muted); text-align: center; font-size: 11px; line-height: 1.65; }
    @media (max-width: 480px) {
      .quotes { grid-template-columns: 1fr; }
      .amount-wrap { min-height: 72px; }
      .quote { padding: 20px; }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Quotation Calculator</p>
    <h1>台币报价计算器</h1>
    <p class="intro">输入人民币拿货价，自动计算两种台币报价。</p>

    <section class="card" aria-label="台币报价计算器">
      <label for="cost">人民币拿货价</label>
      <div class="amount-wrap">
        <input id="cost" type="number" min="0" step="0.01" value="100" inputmode="decimal" autocomplete="off" />
        <span class="amount-code">CNY</span>
      </div>

      <div class="quotes" aria-live="polite">
        <article class="quote">
          <div class="quote-label">A 报价</div>
          <div class="quote-value" id="quoteA">—</div>
          <div class="formula">拿货价 × 4.5 × 3.25</div>
        </article>
        <article class="quote quote-b">
          <div class="quote-label">B 报价</div>
          <div class="quote-value" id="quoteB">—</div>
          <div class="formula">拿货价 × 4.7 × 2.8 × 1.2</div>
        </article>
      </div>

      <p class="note">当前参数为固定值，结果保留两位小数。</p>
    </section>
    <footer>计算结果仅供内部报价参考。</footer>
  </main>

  <script>
    const pricing = {
      A: { exchangeRate: 4.5, multipliers: [3.25] },
      B: { exchangeRate: 4.7, multipliers: [2.8, 1.2] }
    };

    const costInput = document.getElementById("cost");
    const quoteA = document.getElementById("quoteA");
    const quoteB = document.getElementById("quoteB");
    const formatter = new Intl.NumberFormat("zh-TW", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });

    function calculate(cost, config) {
      return config.multipliers.reduce(
        (total, multiplier) => total * multiplier,
        cost * config.exchangeRate
      );
    }

    function showQuote(element, value) {
      element.replaceChildren();
      element.append(document.createTextNode(formatter.format(value) + " "));
      const currency = document.createElement("span");
      currency.textContent = "TWD";
      element.append(currency);
    }

    function render() {
      const rawValue = costInput.value.trim();
      const cost = Number(rawValue);
      if (rawValue === "" || !Number.isFinite(cost) || cost < 0) {
        quoteA.textContent = "—";
        quoteB.textContent = "—";
        return;
      }
      showQuote(quoteA, calculate(cost, pricing.A));
      showQuote(quoteB, calculate(cost, pricing.B));
    }

    costInput.addEventListener("input", render);
    render();
  </script>
</body>
</html>
