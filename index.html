<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d0c" />
  <meta name="description" content="A focused CNY to TWD quotation tool." />
  <title>Quotation</title>
  <style>
    :root {
      --bg: #0b0d0c;
      --panel: #121513;
      --panel-2: #181c19;
      --line: rgba(255,255,255,.09);
      --text: #f5f7f3;
      --muted: #969d97;
      --accent: #c9f85b;
      --accent-ink: #11150d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 78% 12%, rgba(201,248,91,.09), transparent 28rem),
        radial-gradient(circle at 8% 90%, rgba(83,116,88,.12), transparent 32rem),
        var(--bg);
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .28;
      background-image: linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, black, transparent 75%);
    }
    main { width: min(100%, 1120px); margin: 0 auto; padding: clamp(24px, 5vw, 64px) 20px 28px; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: clamp(54px, 9vw, 112px); }
    .brand { display: flex; align-items: center; gap: 11px; font-size: 13px; font-weight: 750; letter-spacing: .14em; text-transform: uppercase; }
    .brand-mark { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 24px rgba(201,248,91,.7); }
    .route { color: var(--muted); font-size: 12px; letter-spacing: .08em; }
    .hero { display: grid; grid-template-columns: .85fr 1.4fr; gap: clamp(36px, 7vw, 100px); align-items: end; }
    .heading { align-self: start; }
    .kicker { margin: 0 0 18px; color: var(--accent); font-size: 12px; font-weight: 750; letter-spacing: .18em; text-transform: uppercase; }
    h1 { margin: 0; max-width: 7ch; font-size: clamp(58px, 9vw, 112px); line-height: .84; letter-spacing: -.075em; font-weight: 650; }
    .intro { max-width: 28rem; margin: 28px 0 0; color: var(--muted); font-size: 14px; line-height: 1.7; }
    .calculator { padding: clamp(22px, 4vw, 42px); border: 1px solid var(--line); border-radius: 30px; background: rgba(18,21,19,.86); box-shadow: 0 40px 100px rgba(0,0,0,.35); backdrop-filter: blur(18px); }
    .input-label { display: flex; justify-content: space-between; margin-bottom: 16px; color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; }
    .input-shell { display: grid; grid-template-columns: minmax(0,1fr) auto; align-items: center; gap: 18px; padding-bottom: 24px; border-bottom: 1px solid var(--line); }
    #cost { width: 100%; min-width: 0; padding: 0; border: 0; outline: 0; color: var(--text); background: transparent; font: 560 clamp(50px, 8vw, 84px)/1 inherit; letter-spacing: -.06em; }
    #cost::-webkit-inner-spin-button, #cost::-webkit-outer-spin-button { appearance: none; margin: 0; }
    .currency { padding: 11px 15px; border: 1px solid var(--line); border-radius: 999px; color: var(--text); background: var(--panel-2); font-size: 12px; font-weight: 800; letter-spacing: .06em; }
    .results { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; margin-top: 14px; }
    .result-card { position: relative; min-width: 0; min-height: 226px; display: flex; flex-direction: column; justify-content: space-between; padding: 22px; overflow: hidden; border: 1px solid var(--line); border-radius: 22px; background: var(--panel-2); }
    .result-card.primary { color: var(--accent-ink); border-color: transparent; background: var(--accent); }
    .result-top { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .result-name { font-size: 12px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
    .tag { color: var(--muted); font-size: 10px; letter-spacing: .08em; }
    .primary .tag { color: rgba(17,21,13,.58); }
    .result-value { margin: 28px 0 14px; overflow-wrap: anywhere; font-size: clamp(35px, 5.1vw, 58px); font-weight: 630; line-height: .95; letter-spacing: -.065em; }
    .result-value span { display: block; margin-top: 10px; font-size: 12px; letter-spacing: .1em; }
    .formula { color: var(--muted); font-size: 11px; letter-spacing: .03em; }
    .primary .formula { color: rgba(17,21,13,.58); }
    .footnote { display: flex; justify-content: space-between; gap: 20px; margin-top: 18px; color: var(--muted); font-size: 10px; letter-spacing: .06em; text-transform: uppercase; }
    @media (max-width: 760px) {
      header { margin-bottom: 56px; }
      .hero { grid-template-columns: 1fr; }
      h1 { max-width: none; font-size: clamp(58px, 20vw, 88px); }
      .intro { margin-top: 20px; }
    }
    @media (max-width: 500px) {
      main { padding-inline: 14px; }
      .calculator { padding: 18px; border-radius: 24px; }
      .results { grid-template-columns: 1fr; }
      .result-card { min-height: 190px; }
      .route { display: none; }
      .footnote { flex-direction: column; gap: 7px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="brand"><i class="brand-mark"></i>Private Desk</div>
      <div class="route">CNY&nbsp;&nbsp;→&nbsp;&nbsp;TWD</div>
    </header>

    <section class="hero">
      <div class="heading">
        <p class="kicker">Pricing utility · 01</p>
        <h1>Quota&shy;tion.</h1>
        <p class="intro">A focused workspace for turning purchase cost into two ready-to-use pricing options.</p>
      </div>

      <section class="calculator" aria-label="Quotation calculator">
        <label class="input-label" for="cost"><span>Purchase cost</span><span>Input / CNY</span></label>
        <div class="input-shell">
          <input id="cost" type="number" min="0" step="0.01" value="100" inputmode="decimal" autocomplete="off" />
          <span class="currency">CNY</span>
        </div>

        <div class="results" aria-live="polite">
          <article class="result-card primary">
            <div class="result-top"><span class="result-name">Option A</span><span class="tag">Standard</span></div>
            <div class="result-value" id="quoteA">—</div>
            <div class="formula">4.5 exchange · 3.25 margin</div>
          </article>
          <article class="result-card">
            <div class="result-top"><span class="result-name">Option B</span><span class="tag">Adjusted</span></div>
            <div class="result-value" id="quoteB">—</div>
            <div class="formula">4.7 exchange · 2.8 margin · 1.2 factor</div>
          </article>
        </div>

        <div class="footnote"><span>Fixed pricing model</span><span>2 decimal precision</span></div>
      </section>
    </section>
  </main>

  <script>
    const pricing = {
      A: { exchangeRate: 4.5, multipliers: [3.25] },
      B: { exchangeRate: 4.7, multipliers: [2.8, 1.2] }
    };
    const costInput = document.getElementById("cost");
    const quoteA = document.getElementById("quoteA");
    const quoteB = document.getElementById("quoteB");
    const formatter = new Intl.NumberFormat("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    function calculate(cost, config) {
      return config.multipliers.reduce((total, multiplier) => total * multiplier, cost * config.exchangeRate);
    }
    function showQuote(element, value) {
      element.replaceChildren();
      element.append(document.createTextNode(formatter.format(value)));
      const currency = document.createElement("span");
      currency.textContent = "TWD";
      element.append(currency);
    }
    function render() {
      const rawValue = costInput.value.trim();
      const cost = Number(rawValue);
      if (rawValue === "" || !Number.isFinite(cost) || cost < 0) {
        quoteA.textContent = "—";
        quoteB.textContent = "—";
        return;
      }
      showQuote(quoteA, calculate(cost, pricing.A));
      showQuote(quoteB, calculate(cost, pricing.B));
    }
    costInput.addEventListener("input", render);
    render();
  </script>
</body>
</html>
